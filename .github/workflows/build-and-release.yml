name: Build and Release Creator Tools

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build with Gradle
        working-directory: CreatorToolsJava
        run: |
          chmod +x ./gradlew
          ./gradlew build
      
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: actions/create-release@v1
        id: create_release
        with:
          tag_name: ${{ github.ref }}
          release_name: Creator Tools ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload JAR to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: CreatorToolsJava/build/libs/CreatorTools-${{ steps.version.outputs.VERSION }}.jar
          asset_name: CreatorTools-${{ steps.version.outputs.VERSION }}.jar
          asset_content_type: application/java-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Publish to Modrinth
        run: |
          echo "Upload jar to Modrinth via API"
          # This would integrate with Modrinth API for automatic publishing
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
